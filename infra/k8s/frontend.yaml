apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: healthcare-platform
  labels:
    app: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: healthcare-exchange-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              name: http
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "150m"
              memory: "128Mi"
          env:
            - name: REACT_APP_API_URL
              value: "http://localhost:5000"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: healthcare-platform
spec:
  ports:
    - port: 80
      targetPort: 80
  selector:
    app: frontend
