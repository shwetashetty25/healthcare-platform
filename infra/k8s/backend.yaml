apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: healthcare-platform
  labels:
    app: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: healthcare-exchange-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
              name: apiport
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
          env:
            - name: DB_HOST
              value: "postgres-service"
            - name: DB_PORT
              value: "5432"
            - name: DB_USER
              value: "postgres"
            - name: DB_PASSWORD
              value: "postgres"
            - name: DB_NAME
              value: "healthcare_db"
            - name: VAULT_ADDR
              value: "http://vault-service:8200"
            - name: VAULT_TOKEN
              value: "root"
            - name: ENCRYPTION_KEY
              value: "ab12cd34ef56gh78ij90kl12mn34op56"
            - name: JWT_SECRET
              value: "healthcare_secret_key_jwt_12345"
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: healthcare-platform
spec:
  ports:
    - port: 5000
      targetPort: 5000
  selector:
    app: backend
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend-hpa
  namespace: healthcare-platform
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
